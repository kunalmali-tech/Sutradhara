<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1050" fill="none">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#E8831A" stop-opacity="0.10" />
      <stop offset="45%" stop-color="#D4A853" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#060A07" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="bgBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0C1410" />
      <stop offset="100%" stop-color="#060A07" />
    </linearGradient>
    <linearGradient id="threadGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8831A" />
      <stop offset="100%" stop-color="#D4A853" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="1050" fill="url(#bgBase)" />
  <rect width="1100" height="1050" fill="url(#bgGlow)" />

  <!-- Outer + inner guide rings -->
  <circle cx="550" cy="430" r="300" fill="none" stroke="#C0C0C0" stroke-opacity="0.14" stroke-width="1" stroke-dasharray="2 8" />
  <circle cx="550" cy="430" r="210" fill="none" stroke="#C0C0C0" stroke-opacity="0.10" stroke-width="1" />

  <!-- Threads from hub to each node -->
  <g stroke="url(#threadGrad)" stroke-width="1.2" stroke-opacity="0.4">
    <line x1="550" y1="430" x2="550.0" y2="170.0" />
    <line x1="550" y1="430" x2="753.3" y2="267.9" />
    <line x1="550" y1="430" x2="803.5" y2="487.9" />
    <line x1="550" y1="430" x2="662.8" y2="664.3" />
    <line x1="550" y1="430" x2="437.2" y2="664.3" />
    <line x1="550" y1="430" x2="296.5" y2="487.9" />
    <line x1="550" y1="430" x2="346.7" y2="267.9" />
  </g>

  <!-- Central hub -->
  <circle cx="550" cy="430" r="76" fill="#162019" stroke="#F5EDD8" stroke-opacity="0.18" stroke-width="1" />
  <circle cx="550" cy="430" r="76" fill="none" stroke="#E8831A" stroke-opacity="0.25" stroke-width="1" />

  <!-- Site logo mark, centered in the hub -->
  <g transform="translate(550 430)">
    <g transform="translate(0 -24)">
      <rect x="-11" y="-11" width="22" height="22" transform="rotate(45)" fill="none" stroke="#E8831A" stroke-width="2.6" />
      <circle cx="0" cy="0" r="3.5" fill="#E8831A" />
    </g>
    <text x="0" y="6" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="700" letter-spacing="2.5" fill="#F5EDD8">THE</text>
    <text x="0" y="27" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" letter-spacing="1" fill="#F5EDD8">SUTRA<tspan fill="#E8831A">DHARA</tspan></text>
  </g>

  <!-- Node: Hatha Sutra (top) -->
  <circle cx="550.0" cy="170.0" r="7" fill="#E8831A" />
  <text x="550.0" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="19" font-weight="700" fill="#F5EDD8" letter-spacing="1">HATHA SUTRA</text>
  <text x="550.0" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E8831A" letter-spacing="2">YOGA</text>

  <!-- Node: Veer Dhara (upper right) -->
  <circle cx="753.3" cy="267.9" r="7" fill="#C94A4A" />
  <text x="771" y="264" text-anchor="start" font-family="Georgia, serif" font-size="19" font-weight="700" fill="#F5EDD8" letter-spacing="1">VEER DHARA</text>
  <text x="771" y="285" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#C94A4A" letter-spacing="1">COURAGE &amp; STRENGTH</text>

  <!-- Node: Nritya Dhara (right) -->
  <circle cx="803.5" cy="487.9" r="7" fill="#C2517A" />
  <text x="821" y="484" text-anchor="start" font-family="Georgia, serif" font-size="19" font-weight="700" fill="#F5EDD8" letter-spacing="1">NRITYA DHARA</text>
  <text x="821" y="505" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#C2517A" letter-spacing="1">DANCE &amp; FLOW</text>

  <!-- Node: Sangeet Dhara (lower right) -->
  <circle cx="662.8" cy="664.3" r="7" fill="#5B9BD5" />
  <text x="662.8" y="698" text-anchor="middle" font-family="Georgia, serif" font-size="19" font-weight="700" fill="#F5EDD8" letter-spacing="1">SANGEET DHARA</text>
  <text x="662.8" y="719" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5B9BD5" letter-spacing="1">RHYTHM &amp; HARMONY</text>

  <!-- Node: Aarogya Dhara (lower left) -->
  <circle cx="437.2" cy="664.3" r="7" fill="#88A85C" />
  <text x="437.2" y="698" text-anchor="middle" font-family="Georgia, serif" font-size="19" font-weight="700" fill="#F5EDD8" letter-spacing="1">AAROGYA DHARA</text>
  <text x="437.2" y="719" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#88A85C" letter-spacing="2">WELLBEING</text>

  <!-- Node: Vastra Dhara (left) -->
  <circle cx="296.5" cy="487.9" r="7" fill="#C8733A" />
  <text x="279" y="484" text-anchor="end" font-family="Georgia, serif" font-size="19" font-weight="700" fill="#F5EDD8" letter-spacing="1">VASTRA DHARA</text>
  <text x="279" y="505" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#C8733A" letter-spacing="1">CONSCIOUS LIVING</text>

  <!-- Node: Jeevan Sutra (upper left) -->
  <circle cx="346.7" cy="267.9" r="7" fill="#6BAA75" />
  <text x="329" y="264" text-anchor="end" font-family="Georgia, serif" font-size="19" font-weight="700" fill="#F5EDD8" letter-spacing="1">JEEVAN SUTRA</text>
  <text x="329" y="285" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#6BAA75" letter-spacing="1">PERSONALITY</text>

  <!-- Divider -->
  <line x1="450" y1="860" x2="650" y2="860" stroke="#C0C0C0" stroke-opacity="0.25" stroke-width="1" />

  <!-- Wordmark -->
  <text x="550" y="935" text-anchor="middle" font-family="Georgia, serif" font-size="58" font-weight="700" letter-spacing="6" fill="#F5EDD8">THE SUTRA<tspan fill="#E8831A">DHARA</tspan></text>
  <text x="550" y="975" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" letter-spacing="6" fill="#7A8A76">WEAVING THE STORY WITHIN</text>
</svg>
